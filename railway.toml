[build]
builder = "nixpacks"
buildCommand = "npm install --include=dev && node node_modules/prisma/build/index.js generate && npm run build"

[deploy]
startCommand = "node node_modules/prisma/build/index.js db push --accept-data-loss && npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
